services:
  backend-1:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - path: .env
        required: false
      - path: .env.example
        required: false
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    depends_on:
      backend-1:
        condition: service_started
    expose:
      - "80"
    labels:
      - coolify.managed=true
      - traefik.enable=true
      - traefik.docker.network=coolify
      - traefik.http.routers.assessment.rule=Host(`assessment.pratikjadhav.dev`)
      - traefik.http.routers.assessment.entrypoints=http
      - traefik.http.routers.assessment-secure.rule=Host(`assessment.pratikjadhav.dev`)
      - traefik.http.routers.assessment-secure.entrypoints=https
      - traefik.http.routers.assessment-secure.tls=true
      - traefik.http.routers.assessment-secure.service=assessment
      - traefik.http.services.assessment.loadbalancer.server.port=80
    networks:
      - default
      - coolify
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  redis_data:

networks:
  coolify:
    external: true
