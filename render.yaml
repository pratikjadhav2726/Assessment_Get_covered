# Render Blueprint — models the same services as docker-compose (API + Redis).
# Render does not execute docker-compose.yml; apply this file via Dashboard → New → Blueprint.
# Nginx in compose is for local multi-instance routing; Render’s edge handles HTTPS for the web service.

services:
  - type: keyvalue
    name: auth-snippet-redis
    ipAllowList:
      - source: 0.0.0.0/0
        description: Required for Key Value; use a stricter CIDR if your org allows

  - type: web
    name: auth-snippet-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    # Render sets PORT; Dockerfile CMD uses 8000, so override start for production.
    dockerCommand: /bin/sh -c "uv run uvicorn app.main:app --app-dir backend --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    envVars:
      - key: STATE_BACKEND
        value: redis
      - key: REDIS_URL
        fromService:
          name: auth-snippet-redis
          type: keyvalue
          property: connectionString
