x-backend-common: &backend-common
  build:
    context: .
    dockerfile: backend/Dockerfile
  env_file:
    - path: .env
      required: false
    - path: .env.example
      required: false
  depends_on:
    redis:
      condition: service_healthy
  restart: unless-stopped
  healthcheck:
    test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
    interval: 20s
    timeout: 5s
    retries: 5
    start_period: 30s

services:
  backend-1:
    <<: *backend-common
    container_name: auth-snippet-backend-1

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: auth-snippet-nginx
    depends_on:
      backend-1:
        condition: service_started
    expose:
      - "80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: auth-snippet-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  redis_data:
